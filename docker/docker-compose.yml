# ============================================
# node-sdr — Docker Compose (Go backend, v2+)
# ============================================
# USB passthrough required for RTL-SDR access.
# On Linux: --device /dev/bus/usb
# On macOS: not directly supported (use VM).
# ============================================

services:
  node-sdr:
    image: ghcr.io/gbozo/no-sdr:latest
    # To build locally instead of pulling, uncomment below and comment out image:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../config:/app/config:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
    # Required for USB access on Linux
    privileged: true
    # ── Resource limits ─────────────────────────────────────────────────────
    # Uncomment and adjust to constrain the container.
    # cpus: fractional cores (0.5 = half a core, 2.0 = two cores)
    # memory: hard limit — container is OOM-killed if exceeded
    #   Typical usage: Go binary ~25MB + FFT history ~25MB + ~2MB per audio client
    #   256M is comfortable for a few clients; raise if running many concurrent users
    # memory_reservation: soft limit / scheduling hint (should be < memory)
    # ────────────────────────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"        # max CPU cores — adjust to your hardware
          memory: 512M       # hard memory cap
        reservations:
          cpus: "0.5"        # guaranteed minimum
          memory: 128M       # soft reservation
    labels:
      traefik.enable: "true"

      # Router — matches both hostnames, TLS enabled
      traefik.http.routers.no-sdr.rule: "Host(`no-sdr.internal`) || Host(`no-sdr`)"
      traefik.http.routers.no-sdr.tls: "true"
      traefik.http.routers.no-sdr.middlewares: "no-sdr-ws"

      # Service — tell Traefik which port the app listens on
      traefik.http.services.no-sdr.loadbalancer.server.port: "3000"

      # Middleware — pass WebSocket upgrade headers through to the backend
      traefik.http.middlewares.no-sdr-ws.headers.customrequestheaders.X-Forwarded-Proto: "https"
      traefik.http.middlewares.no-sdr-ws.headers.customrequestheaders.Connection: "keep-alive, Upgrade"
      traefik.http.middlewares.no-sdr-ws.headers.customrequestheaders.Upgrade: "websocket"
