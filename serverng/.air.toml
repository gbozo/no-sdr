# Air - hot reload for Go
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/serverng"
  cmd = "go build -tags opus -o ./tmp/serverng ./cmd/serverng"
  delay = 500
  exclude_dir = ["tmp", "bin", "graphify-out", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[build.env]
  STATIC_DIR = "../client/dist"
  CONFIG_PATH = "../config/config.yaml"

[log]
  time = false

[misc]
  clean_on_exit = true
