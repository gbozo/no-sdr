# Air - hot reload for Go (GPU/Vulkan build)
# https://github.com/air-verse/air
# Usage: air -c .air.gpu.toml
# Requires: Vulkan SDK installed with pkg-config entry for 'vulkan'

root = "."
tmp_dir = "tmp-gpu"

[build]
  entrypoint = "./tmp-gpu/serverng"
  cmd = "go build -tags \"gpu_vulkan\" -ldflags=\"-s -w\" -o ./tmp-gpu/serverng ./cmd/serverng"
  delay = 500
  exclude_dir = ["tmp", "tmp-gpu", "bin", "graphify-out", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "c", "h"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = true

[build.env]
  STATIC_DIR = "../client/dist"
  CONFIG_PATH = "../config/config.yaml"

[log]
  time = false

[misc]
  clean_on_exit = true
