# ============================================================
# node-sdr Configuration
# ============================================================
# Dongle profiles define frequency/sample rate/demod presets.
# When an admin switches a dongle's profile, all connected
# clients on that dongle are switched automatically.
# ============================================================

server:
  host: "0.0.0.0"
  port: 3000
  adminPassword: "admin"

dongles:
  - id: dongle-0
    deviceIndex: 0
    name: "RTL-SDR #0"
    ppmCorrection: 0
    autoStart: true
    profiles:
      - id: fm-broadcast
        name: "FM Broadcast"
        centerFrequency: 100000000    # 100 MHz
        sampleRate: 2400000           # 2.4 MSPS
        fftSize: 2048
        defaultMode: wfm
        defaultTuneOffset: 0
        defaultBandwidth: 200000      # 200 kHz
        gain: null                    # auto gain
        description: "FM broadcast band — 87.5 to 108 MHz"
        decoders: []

      - id: aviation
        name: "Aviation VHF"
        centerFrequency: 125000000    # 125 MHz
        sampleRate: 2400000
        fftSize: 2048
        defaultMode: am
        defaultTuneOffset: 0
        defaultBandwidth: 8330        # 8.33 kHz (aviation channel spacing)
        gain: 40
        description: "Aviation communications — 118 to 137 MHz"
        decoders: []

      - id: two-meter
        name: "2m Amateur"
        centerFrequency: 146000000    # 146 MHz
        sampleRate: 2400000
        fftSize: 2048
        defaultMode: nfm
        defaultTuneOffset: 0
        defaultBandwidth: 12500
        gain: 40
        description: "Amateur 2m band — 144 to 148 MHz"
        decoders: []

      - id: adsb
        name: "ADS-B 1090"
        centerFrequency: 1090000000   # 1090 MHz
        sampleRate: 2000000           # 2 MSPS (required for ADS-B)
        fftSize: 2048
        defaultMode: raw
        defaultTuneOffset: 0
        defaultBandwidth: 1000000
        gain: 50
        description: "ADS-B aircraft tracking at 1090 MHz"
        decoders:
          - type: adsb
            enabled: true
            frequencyOffset: 0
            bandwidth: 1000000
            options: {}

      - id: marine
        name: "Marine VHF"
        centerFrequency: 159000000    # 159 MHz
        sampleRate: 2400000
        fftSize: 2048
        defaultMode: nfm
        defaultTuneOffset: 0
        defaultBandwidth: 25000
        gain: 40
        description: "Marine VHF — 156 to 162 MHz"
        decoders:
          - type: ais
            enabled: true
            frequencyOffset: 3025000   # 162.025 MHz - 159 MHz
            bandwidth: 25000
            options: {}
