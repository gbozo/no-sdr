# ============================================================
# node-sdr Configuration
# ============================================================
# Dongle profiles define frequency/sample rate/demod presets.
# When an admin switches a dongle's profile, all connected
# clients on that dongle are switched automatically.
#
# Source types:
#   local   - spawn rtl_sdr as child process (default)
#   rtl_tcp - connect to remote rtl_tcp server via TCP
#   demo    - use built-in signal simulator
# ============================================================

server:
  host: 0.0.0.0
  port: 3000
  adminPassword: admin
  demoMode: false
  # FFT resolution used for history storage (independent of per-profile fftSize).
  # Live frames are downsampled to this size using max-hold before storage.
  # Clients interpolate back up to the live fftSize on display.
  # Must be a power of 2 between 256 and 65536.
  fftHistoryFftSize: 4096
  # Compression codec for waterfall history sent on page load/reconnect.
  # 'deflate' — delta+zlib, best ratio (~8-12x), recommended
  # 'adpcm'   — IMA-ADPCM, ~8x, lower CPU
  # 'none'    — uncompressed (64MB+ for large fftSize)
  fftHistoryCompression: deflate
dongles:
  - id: dongle-remote
    deviceIndex: 0
    name: Remote RTL-SDR (rtl_tcp)
    ppmCorrection: 0
    source:
      type: rtl_tcp
      host: 192.168.1.3
      port: 1234
    profiles:
      - id: fm-broadcast
        name: FM Broadcast
        centerFrequency: 100000000
        sampleRate: 2400000
        fftSize: 16384
        fftFps: 30
        defaultMode: wfm
        defaultTuneOffset: 0
        defaultBandwidth: 200000
        gain: 29
        description: FM broadcast band — 87.5 to 108 MHz
        decoders: []
        dongleId: dongle-remote
      - id: aviation
        name: Aviation VHF
        centerFrequency: 125000000
        sampleRate: 2400000
        fftSize: 8192
        fftFps: 30
        defaultMode: am
        defaultTuneOffset: 0
        defaultBandwidth: 8330
        gain: 49
        description: Aviation communications — 118 to 137 MHz
        decoders: []
        dongleId: dongle-remote
      - id: two-meter
        name: 2m Amateur
        centerFrequency: 146000000
        sampleRate: 2400000
        fftSize: 8192
        fftFps: 30
        defaultMode: nfm
        defaultTuneOffset: 0
        defaultBandwidth: 12500
        gain: 40
        description: Amateur 2m band — 144 to 148 MHz
        decoders: []
        dongleId: dongle-remote
      - id: mw-broadcast
        name: MW Broadcast
        centerFrequency: 1000000
        sampleRate: 2400000
        fftSize: 4096
        fftFps: 8
        defaultMode: am
        defaultTuneOffset: 485000
        defaultBandwidth: 10000
        gain: 49.6
        description: MW broadcast band — 530 to 1700 kHz (direct sampling required)
        decoders: []
        dongleId: dongle-remote
    autoStart: true
    biasT: false
    digitalAgc: true
