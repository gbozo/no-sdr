# ============================================================
# node-sdr Configuration
# ============================================================
# Dongle profiles define frequency/sample rate/demod presets.
# When an admin switches a dongle's profile, all connected
# clients on that dongle are switched automatically.
#
# Source types:
#   local   - spawn rtl_sdr as child process (default)
#   rtl_tcp - connect to remote rtl_tcp server via TCP
#   demo    - use built-in signal simulator
# ============================================================

server:
  host: 0.0.0.0
  port: 3000
  adminPassword: admin
  demoMode: false
  callsign: ''
  description: ''
  location: ''
  fftHistoryFftSize: 4096
  fftHistoryCompression: deflate
dongles:
  - id: dongle-remote
    deviceIndex: 0
    name: Remote RTL-SDR (rtl_tcp)
    ppmCorrection: 0
    source:
      type: rtl_tcp
      host: 192.168.1.3
      port: 1234
    profiles:
      - id: fm-broadcast
        name: FM Broadcast
        centerFrequency: 100000000
        sampleRate: 2400000
        fftSize: 8192
        fftFps: 18
        defaultMode: wfm
        defaultTuneOffset: 0
        defaultBandwidth: 200000
        gain: 29
        description: FM broadcast band — 87.5 to 108 MHz
        decoders: []
        dongleId: dongle-remote
      - id: aviation
        name: Aviation VHF
        centerFrequency: 125000000
        sampleRate: 2400000
        fftSize: 8192
        fftFps: 30
        defaultMode: am
        defaultTuneOffset: 0
        defaultBandwidth: 8330
        gain: 49
        description: Aviation communications — 118 to 137 MHz
        decoders: []
        dongleId: dongle-remote
      - id: two-meter
        name: 2m Amateur
        centerFrequency: 146000000
        sampleRate: 2400000
        fftSize: 8192
        fftFps: 30
        defaultMode: nfm
        defaultTuneOffset: 0
        defaultBandwidth: 12500
        gain: 40
        description: Amateur 2m band — 144 to 148 MHz
        decoders: []
        dongleId: dongle-remote
      - id: mw-broadcast
        name: MW Broadcast
        centerFrequency: 1000000
        sampleRate: 2400000
        fftSize: 4096
        fftFps: 8
        defaultMode: am
        defaultTuneOffset: 485000
        defaultBandwidth: 10000
        gain: 49.6
        description: MW broadcast band — 530 to 1700 kHz (direct sampling required)
        decoders: []
        dongleId: dongle-remote
      - id: profile-1777493188871
        name: New Profile
        centerFrequency: 100000000
        sampleRate: 2400000
        fftSize: 2048
        fftFps: 30
        defaultMode: wfm
        defaultTuneOffset: 0
        defaultBandwidth: 200000
        gain: null
        description: ''
        decoders: []
        dongleId: dongle-remote
      - id: profile-1777493231538
        name: ADS-B (1090 MHz)
        centerFrequency: 1090000000
        sampleRate: 2400000
        fftSize: 2048
        fftFps: 10
        defaultMode: nfm
        defaultTuneOffset: 0
        defaultBandwidth: 2000000
        gain: 49
        description: Aircraft transponder 1090 MHz
        decoders: []
        dongleId: dongle-remote
    enabled: true
    autoStart: true
    directSampling: 2
    biasT: false
    digitalAgc: true
    offsetTuning: false
